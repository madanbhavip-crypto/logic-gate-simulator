<!DOCTYPE html>
<html>
<head>
  <title>Logic Gate Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🔌 Logic Gate Simulator</h1>

  <label>Choose a Gate:</label>
  <select id="gateType">
    <option value="AND">AND</option>
    <option value="OR">OR</option>
    <option value="NOT">NOT</option>
    <option value="XOR">XOR</option>
  </select>
  <br><br>

  <label>Input A (0 or 1): </label>
  <input type="number" id="inputA" min="0" max="1">
  <br><br>

  <label id="labelB">Input B (0 or 1): </label>
  <input type="number" id="inputB" min="0" max="1">
  <br><br>

  <button onclick="calculate()">Get Output</button>

  <h2 id="result"></h2>

  <table id="truthTable"></table>

  <script src="script.js"></script>
</body>
</html>
